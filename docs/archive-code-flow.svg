<svg viewBox="0 0 900 580" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background:transparent;font-family:'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#fbbf24"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24" stop-opacity="0.12"/><stop offset="100%" stop-color="#fbbf24" stop-opacity="0.03"/></linearGradient>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">档号生成流程图</text>
  <text x="450" y="48" text-anchor="middle" fill="#64748b" font-size="11">入库第4步 · 选择分类 → 更新档号 → 确认入库</text>

  <!-- ===== Phase 1: 选择分类 ===== -->
  <rect x="40" y="80" width="260" height="170" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="40" y="80" width="260" height="28" rx="10" fill="#fbbf24" opacity="0.08"/>
  <text x="170" y="99" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">① 选择档案分类</text>

  <!-- 一类 -->
  <rect x="55" y="120" width="230" height="34" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="170" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">一类（大类）</text>
  <text x="170" y="155" text-anchor="middle" fill="#64748b" font-size="8">例：建筑工程</text>

  <!-- 二类 -->
  <rect x="55" y="162" width="230" height="34" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="170" y="182" text-anchor="middle" fill="#94a3b8" font-size="10">二类（中类）</text>
  <text x="170" y="197" text-anchor="middle" fill="#64748b" font-size="8">例：工业建筑</text>

  <!-- 三类 -->
  <rect x="55" y="204" width="230" height="34" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="170" y="224" text-anchor="middle" fill="#94a3b8" font-size="10">三类（小类）</text>
  <text x="170" y="239" text-anchor="middle" fill="#64748b" font-size="8">例：厂房</text>

  <!-- Validation logic box -->
  <rect x="55" y="260" width="230" height="55" rx="6" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="170" y="278" text-anchor="middle" fill="#a78bfa" font-size="9">类型层级动态验证</text>
  <text x="170" y="294" text-anchor="middle" fill="#64748b" font-size="8">hasChildren(一类) → 必须选二类</text>
  <text x="170" y="307" text-anchor="middle" fill="#64748b" font-size="8">hasChildren(二类) → 必须选三类</text>

  <!-- Arrow 1→2 -->
  <line x1="300" y1="200" x2="338" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="319" y="192" text-anchor="middle" fill="#475569" font-size="8">点击</text>
  <text x="319" y="213" text-anchor="middle" fill="#475569" font-size="8">更新档号</text>

  <!-- ===== Phase 2: 生成档号 ===== -->
  <rect x="350" y="80" width="280" height="380" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="350" y="80" width="280" height="28" rx="10" fill="#fbbf24" opacity="0.08"/>
  <text x="490" y="99" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">② 生成档号（预览）</text>

  <!-- Project level -->
  <rect x="365" y="120" width="250" height="55" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="490" y="140" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold">项目级</text>
  <text x="490" y="158" text-anchor="middle" fill="#22d3ee" font-size="9">I1-1-029605</text>
  <text x="490" y="170" text-anchor="middle" fill="#475569" font-size="7">3类-项目级流水号</text>

  <!-- Unit level -->
  <rect x="365" y="183" width="250" height="55" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="490" y="203" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">工程级</text>
  <text x="490" y="221" text-anchor="middle" fill="#22d3ee" font-size="9">I1-1-029605-001</text>
  <text x="490" y="233" text-anchor="middle" fill="#475569" font-size="7">项目级档号-工程流水号</text>

  <!-- Volume level -->
  <rect x="365" y="246" width="250" height="85" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="490" y="266" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">案卷级（4个号码）</text>
  <text x="490" y="284" text-anchor="middle" fill="#22d3ee" font-size="9">I1-1-029605-001-001</text>
  <text x="490" y="296" text-anchor="middle" fill="#64748b" font-size="8">总登记号: 387376</text>
  <text x="490" y="310" text-anchor="middle" fill="#64748b" font-size="8">大类流水号: I-233019</text>
  <text x="490" y="324" text-anchor="middle" fill="#64748b" font-size="8">案卷档号: I1-1-168441</text>

  <!-- File level -->
  <rect x="365" y="339" width="250" height="55" rx="6" fill="url(#bg)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.2"/>
  <text x="490" y="359" text-anchor="middle" fill="#fb7185" font-size="10" font-weight="bold">文件级</text>
  <text x="490" y="377" text-anchor="middle" fill="#22d3ee" font-size="9">I1-1-029605-001-001-003</text>
  <text x="490" y="389" text-anchor="middle" fill="#475569" font-size="7">案卷级档号-文件流水号</text>

  <!-- Arrow 2→3 -->
  <line x1="630" y1="300" x2="668" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="649" y="292" text-anchor="middle" fill="#475569" font-size="8">确认</text>
  <text x="649" y="313" text-anchor="middle" fill="#475569" font-size="8">入库</text>

  <!-- ===== Phase 3: 确认入库 ===== -->
  <rect x="680" y="80" width="190" height="380" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.5"/>
  <rect x="680" y="80" width="190" height="28" rx="10" fill="#fbbf24" opacity="0.08"/>
  <text x="775" y="99" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">③ 完成入库</text>

  <rect x="695" y="120" width="160" height="42" rx="6" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="775" y="140" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold">✓ 确认入库</text>
  <text x="775" y="155" text-anchor="middle" fill="#64748b" font-size="8">档号正式生成</text>

  <rect x="695" y="180" width="160" height="42" rx="6" fill="rgba(6,78,59,0.2)" stroke="#34d399" stroke-width="0.8"/>
  <text x="775" y="200" text-anchor="middle" fill="#34d399" font-size="10">档案完成入库</text>
  <text x="775" y="215" text-anchor="middle" fill="#64748b" font-size="8">写入馆藏系统</text>

  <rect x="695" y="240" width="160" height="42" rx="6" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.8"/>
  <text x="775" y="260" text-anchor="middle" fill="#fb7185" font-size="10">🔄 重置</text>
  <text x="775" y="275" text-anchor="middle" fill="#64748b" font-size="8">清空档号</text>

  <!-- Reset arrow -->
  <path d="M 775 282 L 775 460 L 490 460 L 490 340" fill="none" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="630" y="455" text-anchor="middle" fill="#fb7185" font-size="8">重置 → 回到步骤①</text>

  <!-- ===== Bottom: Status table ===== -->
  <rect x="40" y="480" width="830" height="85" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="450" y="498" text-anchor="middle" fill="#64748b" font-size="10" font-weight="bold">三种状态对照</text>

  <!-- State 1 -->
  <rect x="60" y="508" width="250" height="46" rx="6" fill="rgba(76,29,149,0.1)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="185" y="525" text-anchor="middle" fill="#94a3b8" font-size="9">未更新</text>
  <text x="185" y="540" text-anchor="middle" fill="#64748b" font-size="8">档号列显示 -</text>
  <text x="185" y="550" text-anchor="middle" fill="#64748b" font-size="8">确认入库灰色不可点</text>

  <!-- State 2 -->
  <rect x="325" y="508" width="250" height="46" rx="6" fill="rgba(6,78,59,0.1)" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="450" y="525" text-anchor="middle" fill="#94a3b8" font-size="9">已更新（预览）</text>
  <text x="450" y="540" text-anchor="middle" fill="#64748b" font-size="8">档号完整显示</text>
  <text x="450" y="550" text-anchor="middle" fill="#64748b" font-size="8">确认入库蓝色可点</text>

  <!-- State 3 -->
  <rect x="590" y="508" width="260" height="46" rx="6" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="720" y="525" text-anchor="middle" fill="#94a3b8" font-size="9">已重置</text>
  <text x="720" y="540" text-anchor="middle" fill="#64748b" font-size="8">档号列清空显示 -</text>
  <text x="720" y="550" text-anchor="middle" fill="#64748b" font-size="8">保留已选分类，可重新更新</text>
</svg>
