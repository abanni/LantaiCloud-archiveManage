<svg viewBox="0 0 1000 460" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background:transparent;font-family:'PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="#94a3b8"/>
    </marker>
    <!-- Stage gradients -->
    <linearGradient id="s1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/><stop offset="100%" stop-color="#22d3ee" stop-opacity="0.03"/></linearGradient>
    <linearGradient id="s2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#34d399" stop-opacity="0.12"/><stop offset="100%" stop-color="#34d399" stop-opacity="0.03"/></linearGradient>
    <linearGradient id="s3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/><stop offset="100%" stop-color="#a78bfa" stop-opacity="0.03"/></linearGradient>
    <linearGradient id="s4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbbf24" stop-opacity="0.12"/><stop offset="100%" stop-color="#fbbf24" stop-opacity="0.03"/></linearGradient>
  </defs>

  <!-- Stage 1 -->
  <rect x="30" y="10" width="200" height="380" rx="10" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <rect x="30" y="10" width="200" height="28" rx="10" fill="#22d3ee" opacity="0.08"/>
  <text x="130" y="30" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">📥 上传档案包</text>

  <rect x="45" y="55" width="170" height="44" rx="8" fill="#0f172a" stroke="#22d3ee" stroke-width="1.2"/>
  <rect x="45" y="55" width="170" height="44" rx="8" fill="rgba(8,51,68,0.4)"/>
  <text x="130" y="76" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="600">选择档案包</text>
  <text x="130" y="91" text-anchor="middle" fill="#64748b" font-size="9">本地选择或系统推送</text>

  <rect x="55" y="115" width="150" height="30" rx="5" fill="url(#s1)" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="130" y="134" text-anchor="middle" fill="#94a3b8" font-size="9">自动创建项目记录</text>

  <rect x="55" y="153" width="150" height="30" rx="5" fill="url(#s1)" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="130" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">解析档案层级结构</text>

  <rect x="75" y="210" width="110" height="22" rx="11" fill="rgba(8,51,68,0.5)" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="130" y="224" text-anchor="middle" fill="#22d3ee" font-size="9">就绪</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="200" x2="258" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="270" y="10" width="200" height="380" rx="10" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <rect x="270" y="10" width="200" height="28" rx="10" fill="#34d399" opacity="0.08"/>
  <text x="370" y="30" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">🔍 系统检测</text>

  <rect x="285" y="55" width="170" height="44" rx="8" fill="#0f172a" stroke="#34d399" stroke-width="1.2"/>
  <rect x="285" y="55" width="170" height="44" rx="8" fill="rgba(6,78,59,0.4)"/>
  <text x="370" y="76" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">检测档案包</text>
  <text x="370" y="91" text-anchor="middle" fill="#64748b" font-size="9">完整性 + 安全性校验</text>

  <rect x="295" y="115" width="150" height="30" rx="5" fill="url(#s2)" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="370" y="134" text-anchor="middle" fill="#94a3b8" font-size="9">真实性校验</text>

  <rect x="295" y="153" width="150" height="30" rx="5" fill="url(#s2)" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="370" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">完整性核查</text>

  <rect x="295" y="191" width="150" height="30" rx="5" fill="url(#s2)" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="370" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">安全性扫描</text>

  <rect x="315" y="248" width="110" height="22" rx="11" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="370" y="262" text-anchor="middle" fill="#34d399" font-size="9">通过 ✓</text>

  <!-- Arrow 2→3 -->
  <line x1="470" y1="200" x2="498" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="510" y="10" width="200" height="380" rx="10" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <rect x="510" y="10" width="200" height="28" rx="10" fill="#a78bfa" opacity="0.08"/>
  <text x="610" y="30" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="bold">📋 著录元数据</text>

  <rect x="525" y="55" width="170" height="44" rx="8" fill="#0f172a" stroke="#a78bfa" stroke-width="1.2"/>
  <rect x="525" y="55" width="170" height="44" rx="8" fill="rgba(76,29,149,0.4)"/>
  <text x="610" y="76" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">四级元数据编辑</text>
  <text x="610" y="91" text-anchor="middle" fill="#64748b" font-size="9">著录单截图展示 + 只读表单</text>

  <rect x="535" y="115" width="150" height="26" rx="4" fill="url(#s3)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="610" y="132" text-anchor="middle" fill="#94a3b8" font-size="9">🟦 项目级</text>

  <rect x="535" y="147" width="150" height="26" rx="4" fill="url(#s3)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="610" y="164" text-anchor="middle" fill="#94a3b8" font-size="9">🟩 工程级</text>

  <rect x="535" y="179" width="150" height="26" rx="4" fill="url(#s3)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="610" y="196" text-anchor="middle" fill="#94a3b8" font-size="9">🟧 案卷级</text>

  <rect x="535" y="211" width="150" height="26" rx="4" fill="url(#s3)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="610" y="228" text-anchor="middle" fill="#94a3b8" font-size="9">⬜ 文件级</text>

  <rect x="535" y="255" width="150" height="28" rx="5" fill="url(#s3)" stroke="#a78bfa" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="610" y="273" text-anchor="middle" fill="#64748b" font-size="9">PDF 预览 + 右键操作</text>

  <!-- Arrow 3→4 -->
  <line x1="710" y1="200" x2="738" y2="200" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4 -->
  <rect x="750" y="10" width="220" height="380" rx="10" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <rect x="750" y="10" width="220" height="28" rx="10" fill="#fbbf24" opacity="0.08"/>
  <text x="860" y="30" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">✅ 确认入库</text>

  <rect x="765" y="55" width="190" height="44" rx="8" fill="#0f172a" stroke="#fbbf24" stroke-width="1.2"/>
  <rect x="765" y="55" width="190" height="44" rx="8" fill="rgba(120,53,15,0.3)"/>
  <text x="860" y="76" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">生成档号 · 完成归档</text>
  <text x="860" y="91" text-anchor="middle" fill="#64748b" font-size="9">确认后写入馆藏系统</text>

  <rect x="775" y="115" width="170" height="30" rx="5" fill="url(#s4)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="860" y="134" text-anchor="middle" fill="#94a3b8" font-size="9">选择一/二/三类</text>

  <rect x="775" y="153" width="170" height="30" rx="5" fill="url(#s4)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="860" y="172" text-anchor="middle" fill="#94a3b8" font-size="9">更新档号（预览）</text>

  <rect x="775" y="191" width="170" height="30" rx="5" fill="url(#s4)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="860" y="210" text-anchor="middle" fill="#94a3b8" font-size="9">确认完成入库</text>

  <rect x="785" y="248" width="150" height="22" rx="11" fill="rgba(120,53,15,0.5)" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.4"/>
  <text x="860" y="262" text-anchor="middle" fill="#fbbf24" font-size="9">入库成功 🎉</text>

  <!-- Legend -->
  <rect x="30" y="420" width="10" height="10" rx="2" fill="#22d3ee" opacity="0.6"/>
  <text x="46" y="429" fill="#64748b" font-size="10">上传</text>
  <rect x="100" y="420" width="10" height="10" rx="2" fill="#34d399" opacity="0.6"/>
  <text x="116" y="429" fill="#64748b" font-size="10">检测</text>
  <rect x="170" y="420" width="10" height="10" rx="2" fill="#a78bfa" opacity="0.6"/>
  <text x="186" y="429" fill="#64748b" font-size="10">著录</text>
  <rect x="240" y="420" width="10" height="10" rx="2" fill="#fbbf24" opacity="0.6"/>
  <text x="256" y="429" fill="#64748b" font-size="10">入库</text>
</svg>
